<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burrito Palace</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <script>
    (function () {
      var isMobile = false;
      var hasSeenSplash = false;

      try {
        isMobile = window.matchMedia && window.matchMedia('(max-width: 767px)').matches;
      } catch (e) {
        isMobile = false;
      }

      try {
        hasSeenSplash = sessionStorage.getItem('splashShown') === 'true';
      } catch (e) {
        hasSeenSplash = false;
      }

      window.__bpShowMobileSplash = isMobile && !hasSeenSplash;

      if (window.__bpShowMobileSplash) {
        try {
          sessionStorage.setItem('splashShown', 'true');
        } catch (e) {
          // Ignore storage failures and continue loading the page.
        }
      }

      if (window.__bpShowMobileSplash) {
        document.documentElement.classList.add('bp-splash-pending');
      }
    })();
  </script>
  <style>
    :root {
      /* Base Colors */
      --cream: #FFF6E8;
      --warm-brown: #4A2E22;
      --text-primary: #3B241A;
      --text-secondary: #6B4A3A;

      /* Brand Red (UPDATED) */
      --brand-red: #A61E2A;
      --brand-red-dark: #7F1820;

      /* Surface */
      --surface: #FFFDF8;

      /* Depth */
      --shadow-soft: 0 6px 18px rgba(74, 46, 34, 0.10);

      --warm-cream: var(--cream);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      color: var(--text-secondary);
      background: var(--warm-cream);
    }

    .bp-splash-pending body {
      overflow: hidden;
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .site-logo {
      width: min(320px, 74vw);
      height: auto;
      display: block;
    }

    .mobile-splash {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--warm-cream);
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
    }

    .mobile-splash__logo {
      width: min(300px, 68vw);
      height: auto;
      opacity: 0;
      transform: scale(0.95);
    }

    .bp-splash-pending .mobile-splash {
      display: flex;
      opacity: 1;
      animation: bpOverlayOut 1100ms ease forwards;
    }

    .bp-splash-pending .mobile-splash__logo {
      animation: bpLogoIntro 1100ms ease forwards;
    }

    @keyframes bpLogoIntro {
      0% {
        opacity: 0;
        transform: scale(0.94);
      }
      32% {
        opacity: 1;
        transform: scale(1);
      }
      70% {
        opacity: 1;
        transform: scale(1.01);
      }
      100% {
        opacity: 0;
        transform: scale(1.01);
      }
    }

    @keyframes bpOverlayOut {
      0%,
      78% {
        opacity: 1;
      }
      100% {
        opacity: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .bp-splash-pending .mobile-splash,
      .bp-splash-pending .mobile-splash__logo {
        animation: none !important;
        opacity: 1;
        transform: none;
      }
    }

    @media (min-width: 768px) {
      .mobile-splash {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="mobile-splash" id="mobileSplash" aria-hidden="true">
    <img src="/images/burrito-palace-logo.png" alt="" class="mobile-splash__logo">
  </div>

  <main class="app-shell" aria-label="Burrito Palace home">
    <img src="/images/burrito-palace-logo.png" alt="Burrito Palace Logo" class="site-logo">
  </main>

  <script>
    (function () {
      if (!window.__bpShowMobileSplash) {
        document.documentElement.classList.remove('bp-splash-pending');
        return;
      }

      var splash = document.getElementById('mobileSplash');
      if (!splash) {
        document.documentElement.classList.remove('bp-splash-pending');
        return;
      }

      var finished = false;
      var reduceMotion = false;

      try {
        reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      } catch (e) {
        reduceMotion = false;
      }

      function completeSplash() {
        if (finished) {
          return;
        }
        finished = true;
        document.documentElement.classList.remove('bp-splash-pending');

      }

      if (reduceMotion) {
        window.setTimeout(completeSplash, 80);
        return;
      }

      splash.addEventListener('animationend', function (event) {
        if (event.animationName === 'bpOverlayOut') {
          completeSplash();
        }
      }, { once: true });

      window.setTimeout(completeSplash, 1300);
    })();
  </script>
</body>
</html>
